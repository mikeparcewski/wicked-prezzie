<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1280">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0A0F; font-family: Calibri, sans-serif; }
        .slide {
            width: 1280px; height: 720px;
            position: relative; overflow: hidden;
            background: #0A0A0F;
        }
        h1 {
            color: #FFFFFF; font-size: 48px; font-weight: 700;
            text-align: center; padding-top: 200px;
        }
        .subtitle {
            color: #A0A0B0; font-size: 24px;
            text-align: center; margin-top: 24px;
        }
        .accent-bar {
            width: 120px; height: 4px;
            background: #A100FF;
            margin: 32px auto 0;
        }
    </style>
</head>
<body class="standalone">
    <div class="slide title-slide">
        <h1>AI-Powered Analytics</h1>
        <p class="subtitle">Transforming Data into Decisions</p>
        <div class="accent-bar"></div>
    </div>
</body>
</html>

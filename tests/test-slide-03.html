<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1280">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #140024; font-family: Calibri, sans-serif; }
        .slide {
            width: 1280px; height: 720px;
            position: relative; overflow: hidden;
            background: #140024;
        }
        .content {
            text-align: center;
            padding-top: 180px;
        }
        h1 {
            color: #FFFFFF; font-size: 52px; font-weight: 700;
        }
        h1 span { color: #A100FF; }
        .tagline {
            color: #D0C0E0; font-size: 28px;
            margin-top: 24px;
        }
        .divider {
            width: 200px; height: 2px;
            background: linear-gradient(90deg, transparent, #A100FF, transparent);
            margin: 32px auto;
        }
        .cta {
            display: inline-block;
            background: #A100FF; color: #FFFFFF;
            font-size: 20px; font-weight: 600;
            padding: 16px 48px; border-radius: 8px;
            margin-top: 16px;
        }
    </style>
</head>
<body class="standalone">
    <div class="slide section-divider">
        <div class="content">
            <h1>Ready to <span>Transform</span>?</h1>
            <div class="divider"></div>
            <p class="tagline">Let's build the future of analytics together.</p>
            <div class="cta">Get Started Today</div>
        </div>
    </div>
</body>
</html>
